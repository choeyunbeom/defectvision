services:
  api:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"
    volumes:
      # Mount model checkpoints — not baked into the image (large files)
      - ./results:/app/results:ro
      # Mount HuggingFace cache so backbone weights don't need to be re-downloaded
      - ~/.cache/huggingface:/root/.cache/huggingface:ro
    environment:
      MODEL_PATH: results/Patchcore/MVTec/bottle/v3/weights/lightning/model.ckpt
      MODEL_CATEGORY: bottle
      RUNTIME: pytorch
      IMAGE_SIZE: "256"
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  dashboard:
    build:
      context: .
      target: runtime
    ports:
      - "8501:8501"
    environment:
      # Dashboard reads API via service name inside Docker network
      API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    command: ["streamlit", "run", "src/dashboard/app.py",
              "--server.port", "8501",
              "--server.address", "0.0.0.0",
              "--server.headless", "true"]
    restart: unless-stopped
